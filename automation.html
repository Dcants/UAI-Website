<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Business Automations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent !important;
    margin: 0;
    display: flex; 
    align-items: center; 
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .automation-wrap {
    width: 100%;
    height: 100%;
    transform: scale(0.85);
    position: relative;
    z-index: 1;
    background: transparent;
    border-radius: 20px;
    display: flex; 
    align-items: center; 
    justify-content: center;
  }

  svg { 
    width: 100%; 
    height: 100%; 
    overflow: visible; 
  }

  .core-pulse {
    transform-origin: 140px 140px;
    animation: coreScale 2s ease-in-out infinite alternate;
  }

  @keyframes coreScale {
    0% { transform: scale(0.95); filter: brightness(0.8); }
    100% { transform: scale(1.05); filter: brightness(1.2); }
  }
</style>
</head>
<body>
  <div class="automation-wrap">
    <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-intense">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <polygon points="140,30 235,85 235,195 140,250 45,195 45,85" 
               fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.2" />
      <polygon points="140,50 218,95 218,185 140,230 62,185 62,95" 
               fill="none" stroke="#00aaff" stroke-width="1" opacity="0.4" />

      <circle cx="140" cy="140" r="85" fill="none" stroke="#ff00cc" stroke-width="2.5" stroke-dasharray="30 15 5 15" filter="url(#glow)">
         <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="12s" repeatCount="indefinite" />
      </circle>

      <circle cx="140" cy="140" r="60" fill="none" stroke="#00ffee" stroke-width="3" stroke-dasharray="20 20" filter="url(#glow)">
         <animateTransform attributeName="transform" type="rotate" from="360 140 140" to="0 140 140" dur="8s" repeatCount="indefinite" />
      </circle>
      
      <circle cx="140" cy="140" r="45" fill="none" stroke="#00aaff" stroke-width="1" stroke-dasharray="4 4" opacity="0.6">
         <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="20s" repeatCount="indefinite" />
      </circle>

      <g class="core-pulse">
        <circle cx="140" cy="140" r="22" fill="#020812" stroke="#00ffee" stroke-width="3" filter="url(#glow-intense)"/>
        <circle cx="140" cy="140" r="12" fill="#00ffee" filter="url(#glow)"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="4s" repeatCount="indefinite"/>
        <circle cx="140" cy="55" r="7" fill="#ff00cc" filter="url(#glow-intense)"/>
        <line x1="140" y1="62" x2="140" y2="118" stroke="#ff00cc" stroke-width="1" opacity="0.5" />
      </g>
      
      <g>
        <animateTransform attributeName="transform" type="rotate" from="120 140 140" to="480 140 140" dur="4s" repeatCount="indefinite"/>
        <circle cx="140" cy="55" r="7" fill="#00ffee" filter="url(#glow-intense)"/>
        <line x1="140" y1="62" x2="140" y2="118" stroke="#00ffee" stroke-width="1" opacity="0.5" />
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="240 140 140" to="600 140 140" dur="4s" repeatCount="indefinite"/>
        <circle cx="140" cy="55" r="7" fill="#00aaff" filter="url(#glow-intense)"/>
        <line x1="140" y1="62" x2="140" y2="118" stroke="#00aaff" stroke-width="1" opacity="0.5" />
      </g>
    </svg>
  </div>
</body>
</html>
