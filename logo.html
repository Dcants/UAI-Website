<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UAI Logo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: transparent !important;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  @keyframes spinCW { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes spinCCW { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
  @keyframes corePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes scanline { 0%{transform:translateY(-120px)} 100%{transform:translateY(600px)} }
  @keyframes dotTrail { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }
  @keyframes haloScale { 0%,100%{transform:scale(1);opacity:.18} 50%{transform:scale(1.18);opacity:.06} }
  @keyframes energyFlash { 0%,100%{opacity:.7} 50%{opacity:1} }

  .wrap {
    width: 100%;
    height: 100%;
    transform: scale(0.85);
    background: transparent;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .scan {
    position: absolute;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(transparent,rgba(0,255,180,.055),transparent);
    animation: scanline 4s linear infinite;
    pointer-events: none;
  }

  .halo {
    position: absolute;
    border-radius: 50%;
    background: transparent;
    border: 1px solid;
    pointer-events: none;
    animation: haloScale 3s ease-in-out infinite;
  }

  .h1{width:380px;height:380px;border-color:#00ffcc22;animation-delay:0s}
  .h2{width:420px;height:420px;border-color:#ff00ff18;animation-delay:.8s}
  .h3{width:460px;height:460px;border-color:#00aaff14;animation-delay:1.6s}

  .stage {
    position: relative;
    width: 320px;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 700px;
  }

  .orbit-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
</style>
</head>
<body>
  <div class="scan"></div>
  <div class="halo h1"></div>
  <div class="halo h2"></div>
  <div class="halo h3"></div>

  <div class="stage">
    <svg class="orbit-svg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow2">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <path id="path1" d="M 160,108 a130,42 0 1,1 -0.01,0" fill="none"/>
        <path id="path2" d="M 160,108 a130,42 0 1,1 -0.01,0" fill="none" transform="rotate(60,160,160)"/>
        <path id="path3" d="M 160,108 a130,42 0 1,1 -0.01,0" fill="none" transform="rotate(120,160,160)"/>
      </defs>

      <!-- Ring 1 — cyan -->
      <ellipse cx="160" cy="160" rx="130" ry="42"
        fill="none" stroke="#00ffee" stroke-width="2.2" opacity=".85" filter="url(#glow)"
        stroke-dasharray="8 4">
        <animate attributeName="stroke-dashoffset" from="0" to="-240" dur="5s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Ring 2 — magenta, 60deg -->
      <ellipse cx="160" cy="160" rx="130" ry="42"
        fill="none" stroke="#ff00cc" stroke-width="2" opacity=".8" filter="url(#glow)"
        transform="rotate(60,160,160)" stroke-dasharray="6 5">
        <animate attributeName="stroke-dashoffset" from="0" to="240" dur="7s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Ring 3 — electric blue, 120deg -->
      <ellipse cx="160" cy="160" rx="130" ry="42"
        fill="none" stroke="#00aaff" stroke-width="2" opacity=".8" filter="url(#glow)"
        transform="rotate(120,160,160)" stroke-dasharray="10 3">
        <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="9s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Globe -->
      <circle cx="160" cy="160" r="52" fill="#000d20" stroke="#00ffee" stroke-width="2" filter="url(#glow)">
        <animate attributeName="r" values="52;54;52" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="160" cy="160" r="48" fill="#020f22"/>
      <ellipse cx="160" cy="160" rx="48" ry="14" fill="none" stroke="#00ffee" stroke-width="1" opacity=".55"/>
      <ellipse cx="160" cy="160" rx="48" ry="28" fill="none" stroke="#00ffee" stroke-width="1" opacity=".4"/>
      <ellipse cx="160" cy="160" rx="48" ry="42" fill="none" stroke="#00ffee" stroke-width="1" opacity=".28"/>
      <ellipse cx="160" cy="160" rx="16" ry="48" fill="none" stroke="#00ffee" stroke-width="1" opacity=".55"/>
      <ellipse cx="160" cy="160" rx="35" ry="48" fill="none" stroke="#00ffee" stroke-width="1" opacity=".4"/>
      <line x1="160" y1="112" x2="160" y2="208" stroke="#00ffee" stroke-width="1" opacity=".5"/>
      <line x1="112" y1="160" x2="208" y2="160" stroke="#00ffee" stroke-width="1" opacity=".5"/>
      <circle cx="160" cy="160" r="10" fill="#00ffee" opacity=".9" filter="url(#glow2)">
        <animate attributeName="opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Electrons ring 1 (cyan) -->
      <circle r="8" fill="#00ffee" filter="url(#glow2)">
        <animateMotion dur="5s" repeatCount="indefinite" rotate="none"><mpath href="#path1"/></animateMotion>
      </circle>
      <circle r="5.5" fill="#00ffee" filter="url(#glow2)" opacity=".5">
        <animateMotion dur="5s" begin="-2.5s" repeatCount="indefinite" rotate="none"><mpath href="#path1"/></animateMotion>
      </circle>

      <!-- Electrons ring 2 (magenta) -->
      <circle r="8" fill="#ff44dd" filter="url(#glow2)">
        <animateMotion dur="7s" repeatCount="indefinite" rotate="none"><mpath href="#path2"/></animateMotion>
      </circle>
      <circle r="5" fill="#ff44dd" filter="url(#glow2)" opacity=".5">
        <animateMotion dur="7s" begin="-3.5s" repeatCount="indefinite" rotate="none"><mpath href="#path2"/></animateMotion>
      </circle>

      <!-- Electrons ring 3 (blue) -->
      <circle r="8" fill="#44ccff" filter="url(#glow2)">
        <animateMotion dur="9s" repeatCount="indefinite" rotate="none"><mpath href="#path3"/></animateMotion>
      </circle>
      <circle r="5" fill="#44ccff" filter="url(#glow2)" opacity=".5">
        <animateMotion dur="9s" begin="-4.5s" repeatCount="indefinite" rotate="none"><mpath href="#path3"/></animateMotion>
      </circle>
    </svg>
  </div>
</body>
</html>
